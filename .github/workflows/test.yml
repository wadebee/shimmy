name: Shim Tests

on:
  pull_request:
    paths:
      - "shims/**"
      - "scripts/install-shimmy.sh"
      - "scripts/test-shimmy.sh"
      - "Taskfile.yml"
      - "bootstrap"
      - "images/task/**"
      - "runtime/**"
      - "Makefile"
      - ".pre-commit-config.yaml"
      - ".github/workflows/test.yml"
  push:
    paths:
      - "shims/**"
      - "scripts/install-shimmy.sh"
      - "scripts/test-shimmy.sh"
      - "Taskfile.yml"
      - "bootstrap"
      - "images/task/**"
      - "runtime/**"
      - "Makefile"
      - ".pre-commit-config.yaml"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  shim-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shim tests
        run: ./scripts/test-shimmy.sh
